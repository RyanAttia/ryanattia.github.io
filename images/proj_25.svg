<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#0d1117"/><stop offset="100%" style="stop-color:#1a0d2e"/></linearGradient></defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Unit circle -->
  <circle cx="310" cy="270" r="150" fill="none" stroke="#30363d" stroke-width="1.5"/>
  <line x1="150" y1="270" x2="470" y2="270" stroke="#30363d" stroke-width="1"/>
  <line x1="310" y1="110" x2="310" y2="430" stroke="#30363d" stroke-width="1"/>
  <!-- CORDIC rotation vector -->
  <line x1="310" y1="270" x2="416" y2="165" stroke="#bc8cff" stroke-width="2.5"/>
  <circle cx="416" cy="165" r="5" fill="#bc8cff"/>
  <!-- Angle arc -->
  <path d="M360 270 A50 50 0 0 0 345 228" fill="none" stroke="#e3b341" stroke-width="2"/>
  <text x="372" y="245" fill="#e3b341" font-family="monospace" font-size="12">θ</text>
  <!-- cos/sin labels -->
  <line x1="416" y1="165" x2="416" y2="270" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="430" y="225" fill="#58a6ff" font-family="monospace" font-size="11">sin(θ)</text>
  <line x1="310" y1="270" x2="416" y2="270" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="355" y="290" fill="#3fb950" font-family="monospace" font-size="11">cos(θ)</text>
  <!-- Iteration steps -->
  <text x="550" y="150" fill="#bc8cff" font-family="monospace" font-size="12" font-weight="bold">CORDIC Iterations</text>
  <text x="550" y="175" fill="#8b949e" font-family="monospace" font-size="11">i=0: rotate +45°</text>
  <text x="550" y="195" fill="#8b949e" font-family="monospace" font-size="11">i=1: rotate −26.6°</text>
  <text x="550" y="215" fill="#8b949e" font-family="monospace" font-size="11">i=2: rotate +14.0°</text>
  <text x="550" y="235" fill="#8b949e" font-family="monospace" font-size="11">i=3: rotate −7.1°</text>
  <text x="550" y="255" fill="#58a6ff" font-family="monospace" font-size="11">→ shift-add only</text>
  <!-- Pipeline diagram -->
  <rect x="530" y="290" width="220" height="110" rx="6" fill="#161b22" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="640" y="315" text-anchor="middle" fill="#bc8cff" font-family="monospace" font-size="11">Pipelined VHDL</text>
  <rect x="545" y="325" width="55" height="22" rx="3" fill="#21262d" stroke="#bc8cff44" stroke-width="1"/><text x="572" y="341" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="9">Stage 0</text>
  <rect x="610" y="325" width="55" height="22" rx="3" fill="#21262d" stroke="#bc8cff44" stroke-width="1"/><text x="637" y="341" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="9">Stage 1</text>
  <rect x="675" y="325" width="55" height="22" rx="3" fill="#21262d" stroke="#bc8cff44" stroke-width="1"/><text x="702" y="341" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="9">Stage 2</text>
  <line x1="600" y1="336" x2="610" y2="336" stroke="#bc8cff" stroke-width="1"/>
  <line x1="665" y1="336" x2="675" y2="336" stroke="#bc8cff" stroke-width="1"/>
  <text x="640" y="385" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="10">16-bit fixed point DSP</text>
  <text x="400" y="65" text-anchor="middle" fill="#ffffff" font-family="monospace" font-size="19" font-weight="bold">CORDIC-Based Signal Processor</text>
  <text x="400" y="92" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="13">VHDL · HLS · Fixed-Point DSP</text>
</svg>
