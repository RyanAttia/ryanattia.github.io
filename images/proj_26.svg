<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#0d1117"/><stop offset="100%" style="stop-color:#1a2332"/></linearGradient></defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Maze grid -->
  <g stroke="#30363d" stroke-width="2" fill="none">
    <rect x="80" y="120" width="340" height="300"/>
    <!-- Horizontal walls -->
    <line x1="80" y1="180" x2="200" y2="180"/><line x1="260" y1="180" x2="420" y2="180"/>
    <line x1="80" y1="240" x2="140" y2="240"/><line x1="200" y1="240" x2="360" y2="240"/>
    <line x1="140" y1="300" x2="300" y2="300"/><line x1="360" y1="300" x2="420" y2="300"/>
    <line x1="80" y1="360" x2="160" y2="360"/><line x1="220" y1="360" x2="420" y2="360"/>
    <!-- Vertical walls -->
    <line x1="140" y1="120" x2="140" y2="180"/><line x1="140" y1="240" x2="140" y2="360"/>
    <line x1="200" y1="180" x2="200" y2="300"/><line x1="260" y1="120" x2="260" y2="180"/>
    <line x1="260" y1="240" x2="260" y2="300"/><line x1="300" y1="300" x2="300" y2="420"/>
    <line x1="360" y1="180" x2="360" y2="240"/><line x1="360" y1="300" x2="360" y2="360"/>
  </g>
  <!-- BFS path -->
  <circle cx="110" cy="150" r="10" fill="#3fb950" opacity="0.9"/>
  <text x="110" y="155" text-anchor="middle" fill="#0d1117" font-family="monospace" font-size="10" font-weight="bold">S</text>
  <circle cx="390" cy="390" r="10" fill="#f85149" opacity="0.9"/>
  <text x="390" y="395" text-anchor="middle" fill="#0d1117" font-family="monospace" font-size="10" font-weight="bold">G</text>
  <!-- Solution path -->
  <polyline points="110,150 170,150 170,210 230,210 230,150 320,150 320,210 390,210 390,270 330,270 330,330 390,330 390,390" fill="none" stroke="#58a6ff" stroke-width="3" stroke-dasharray="6,3" opacity="0.8"/>
  <!-- BFS tree on right -->
  <text x="560" y="148" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="11">BFS Search Tree</text>
  <circle cx="560" cy="175" r="14" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
  <text x="560" y="180" text-anchor="middle" fill="#3fb950" font-family="monospace" font-size="10">S</text>
  <line x1="546" y1="189" x2="510" y2="215" stroke="#30363d" stroke-width="1.5"/>
  <line x1="574" y1="189" x2="610" y2="215" stroke="#30363d" stroke-width="1.5"/>
  <circle cx="505" cy="225" r="12" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/><text x="505" y="230" text-anchor="middle" fill="#58a6ff" font-family="monospace" font-size="9">n1</text>
  <circle cx="615" cy="225" r="12" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/><text x="615" y="230" text-anchor="middle" fill="#58a6ff" font-family="monospace" font-size="9">n2</text>
  <line x1="495" y1="237" x2="475" y2="263" stroke="#30363d" stroke-width="1.5"/>
  <line x1="515" y1="237" x2="535" y2="263" stroke="#30363d" stroke-width="1.5"/>
  <line x1="605" y1="237" x2="585" y2="263" stroke="#30363d" stroke-width="1.5"/>
  <line x1="625" y1="237" x2="645" y2="263" stroke="#30363d" stroke-width="1.5"/>
  <circle cx="470" cy="273" r="11" fill="#161b22" stroke="#8b949e" stroke-width="1"/><text x="470" y="278" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="8">n3</text>
  <circle cx="540" cy="273" r="11" fill="#161b22" stroke="#8b949e" stroke-width="1"/><text x="540" y="278" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="8">n4</text>
  <circle cx="580" cy="273" r="11" fill="#161b22" stroke="#8b949e" stroke-width="1"/><text x="580" y="278" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="8">n5</text>
  <circle cx="650" cy="273" r="11" fill="#161b22" stroke="#f85149" stroke-width="2"/><text x="650" y="278" text-anchor="middle" fill="#f85149" font-family="monospace" font-size="8">G</text>
  <!-- Legend -->
  <rect x="450" y="330" width="240" height="80" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="570" y="352" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="10">Uninformed Search</text>
  <circle cx="470" cy="368" r="5" fill="#3fb950"/><text x="480" y="372" fill="#8b949e" font-family="monospace" font-size="10"> BFS  </text>
  <circle cx="530" cy="368" r="5" fill="#58a6ff"/><text x="540" y="372" fill="#8b949e" font-family="monospace" font-size="10"> DFS  </text>
  <circle cx="590" cy="368" r="5" fill="#e3b341"/><text x="600" y="372" fill="#8b949e" font-family="monospace" font-size="10"> UCS</text>
  <text x="570" y="400" text-anchor="middle" fill="#58a6ff" font-family="monospace" font-size="10">8-puzzle · Maze · N-Queens</text>
  <text x="400" y="65" text-anchor="middle" fill="#ffffff" font-family="monospace" font-size="18" font-weight="bold">Classic Puzzle Solver</text>
  <text x="400" y="92" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="13">Python · BFS / DFS / UCS · AI Search</text>
</svg>
