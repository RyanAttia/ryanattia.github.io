  <text x="280" y="265" text-anchor="middle" fill="#ff7b72" font-family="monospace" font-size="10">GHOST</text>
  <!-- Dots -->
  <circle cx="105" cy="180" r="3" fill="#ffb8ae"/><circle cx="145" cy="145" r="3" fill="#ffb8ae"/><circle cx="225" cy="145" r="3" fill="#ffb8ae"/>
  <circle cx="310" cy="145" r="3" fill="#ffb8ae"/><circle cx="395" cy="145" r="3" fill="#ffb8ae"/><circle cx="465" cy="180" r="3" fill="#ffb8ae"/>
  <circle cx="105" cy="280" r="3" fill="#ffb8ae"/><circle cx="465" cy="280" r="3" fill="#ffb8ae"/>
  <circle cx="105" cy="390" r="3" fill="#ffb8ae"/><circle cx="200" cy="410" r="3" fill="#ffb8ae"/><circle cx="310" cy="410" r="3" fill="#ffb8ae"/><circle cx="420" cy="410" r="3" fill="#ffb8ae"/>
  <!-- Power pellets -->
  <circle cx="105" cy="145" r="7" fill="#ffb8ae"/>
  <circle cx="465" cy="145" r="7" fill="#ffb8ae"/>
  <circle cx="105" cy="410" r="7" fill="#ffb8ae"/>
  <circle cx="465" cy="410" r="7" fill="#ffb8ae"/>
  <!-- Pac-Man -->
  <path d="M310 290 L350 275 A40 40 0 1 1 350 305 Z" fill="#ffff00"/>
