  <ellipse cx="195" cy="290" rx="16" ry="18" fill="#ff7b72"/>
  <rect x="179" y="290" width="32" height="10" fill="#ff7b72"/>
  <circle cx="189" cy="284" r="5" fill="white"/><circle cx="201" cy="284" r="5" fill="white"/>
  <circle cx="190" cy="285" r="2" fill="#2121de"/><circle cx="202" cy="285" r="2" fill="#2121de"/>
  <ellipse cx="395" cy="200" rx="16" ry="18" fill="#ffb8ff"/>
  <rect x="379" y="200" width="32" height="10" fill="#ffb8ff"/>
  <circle cx="389" cy="194" r="5" fill="white"/><circle cx="401" cy="194" r="5" fill="white"/>
  <circle cx="390" cy="195" r="2" fill="#2121de"/><circle cx="402" cy="195" r="2" fill="#2121de"/>
  <!-- Q-learning info -->
  <rect x="570" y="130" width="190" height="200" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="665" y="155" text-anchor="middle" fill="#3fb950" font-family="monospace" font-size="11">Q-Learning</text>
  <text x="665" y="175" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="9">Q(s,a) ← Q(s,a) +</text>
  <text x="665" y="190" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="9">α[r + γ·max Q(s')]</text>
  <line x1="580" y1="205" x2="750" y2="205" stroke="#30363d" stroke-width="1"/>
  <text x="665" y="222" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="9">State: grid position</text>
  <text x="665" y="238" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="9">Actions: U D L R</text>
  <text x="665" y="254" text-anchor="middle" fill="#58a6ff" font-family="monospace" font-size="9">+10 dot  +50 pellet</text>
