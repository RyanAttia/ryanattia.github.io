<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#000000"/><stop offset="100%" style="stop-color:#00001a"/></linearGradient></defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Pac-Man maze walls -->
  <rect x="80" y="120" width="460" height="320" rx="4" fill="none" stroke="#2121de" stroke-width="3"/>
