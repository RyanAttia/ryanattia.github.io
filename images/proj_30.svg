  <rect x="120" y="160" width="80" height="40" rx="2" fill="#2121de"/>
  <rect x="240" y="160" width="80" height="40" rx="2" fill="#2121de"/>
  <rect x="360" y="160" width="80" height="40" rx="2" fill="#2121de"/>
  <rect x="120" y="240" width="80" height="40" rx="2" fill="#2121de"/>
  <rect x="360" y="240" width="80" height="40" rx="2" fill="#2121de"/>
  <rect x="120" y="320" width="80" height="40" rx="2" fill="#2121de"/>
  <rect x="240" y="320" width="80" height="40" rx="2" fill="#2121de"/>
  <rect x="360" y="320" width="80" height="40" rx="2" fill="#2121de"/>
  <!-- Ghost house -->
