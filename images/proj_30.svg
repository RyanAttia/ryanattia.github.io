  <text x="665" y="290" text-anchor="middle" fill="#e3b341" font-family="monospace" font-size="9">BFS ghost pathing</text>
  <rect x="570" y="350" width="190" height="60" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="665" y="373" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="9">Episode 1:  score  120</text>
  <text x="665" y="390" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="9">Episode 500: score 4820</text>
  <text x="400" y="65" text-anchor="middle" fill="#ffff00" font-family="monospace" font-size="20" font-weight="bold">Autonomous Pac-Man</text>
  <text x="400" y="92" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="13">Python · Q-Learning · BFS · Pygame</text>
</svg>
